<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Engage by Elevate</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080808; color: #fff; font-family: 'Manrope', -apple-system, sans-serif; font-size: 14px; line-height: 1.6; }
  .topbar { background: #0e0e10; border-bottom: 1px solid #27272a; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar img { height: 28px; }
  .topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #EC672C; }
  .topbar-spacer { flex: 1; }
  .topbar-email { font-size: 12px; color: #6a6a75; }
  .topbar-out { background: none; border: 1px solid #27272a; color: #b0b0b8; padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .topbar-out:hover { border-color: #EC672C; color: #EC672C; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #27272a; padding: 0 24px; background: #0e0e10; }
  .tab { padding: 14px 20px; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #6a6a75; cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
  .tab:hover { color: #b0b0b8; }
  .tab.active { color: #EC672C; border-bottom-color: #EC672C; }
  .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .card { background: #141416; border: 1px solid #27272a; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #141416; border: 1px solid #27272a; border-radius: 8px; padding: 16px; }
  .stat-num { font-family: 'Archivo', sans-serif; font-size: 32px; font-weight: 800; color: #EC672C; }
  .stat-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6a6a75; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6a6a75; border-bottom: 1px solid #27272a; font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1d; color: #b0b0b8; }
  tr:hover td { background: #1a1a1d; }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: 1px solid #27272a; background: none; color: #b0b0b8; font-family: inherit; font-weight: 600; }
  .btn-sm:hover { border-color: #EC672C; color: #EC672C; }
  .btn-sm.danger { border-color: #ef4444; color: #ef4444; }
  .btn-sm.danger:hover { background: #ef444420; }
  .btn-sm.primary { background: #EC672C; border-color: #EC672C; color: #fff; }
  .btn-sm.primary:hover { background: #d4551f; }
  .filter-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-row input, .filter-row select { padding: 8px 12px; background: #141416; border: 1px solid #27272a; border-radius: 4px; color: #fff; font-family: inherit; font-size: 13px; }
  .filter-row input { flex: 1; min-width: 200px; }
  .filter-row select { min-width: 120px; }
  .scroll-x { overflow-x: auto; }
  h2 { font-family: 'Archivo', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #b0b0b8; }
  .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid #27272a; border-top-color: #EC672C; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #141416; border: 1px solid #27272a; color: #fff; padding: 12px 20px; border-radius: 6px; font-size: 13px; z-index: 9999; }
  .toast.ok { border-color: #22c55e; }
  .toast.err { border-color: #ef4444; }
  textarea { width: 100%; padding: 10px; background: #141416; border: 1px solid #27272a; border-radius: 4px; color: #fff; font-family: inherit; font-size: 13px; resize: vertical; min-height: 80px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6a6a75; margin-bottom: 4px; font-weight: 600; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-card { background: #141416; border: 1px solid #27272a; border-radius: 8px; padding: 20px; }
  .chart-card h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; color: #6a6a75; margin-bottom: 16px; }
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: #b0b0b8; min-width: 80px; text-align: right; }
  .bar-track { flex: 1; height: 24px; background: #1a1a1d; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: #fff; min-width: 28px; }
  .bar-value { font-size: 12px; color: #6a6a75; min-width: 36px; text-align: right; }
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; }
  .donut-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #b0b0b8; }
  .donut-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: #141416; border: 1px solid #27272a; border-radius: 8px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #6a6a75; font-size: 20px; cursor: pointer; }
  .modal-close:hover { color: #fff; }
  .preview-frame { width: 100%; min-height: 400px; border: 1px solid #27272a; border-radius: 4px; background: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <img src="/img/logo.png" alt="Elevate">
  <span class="topbar-title">Admin Panel</span>
  <span class="topbar-spacer"></span>
  <span class="topbar-email" id="admin-email"></span>
  <button class="topbar-out" id="sign-out">Sign Out</button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview">Overview</button>
  <button class="tab" data-tab="users">Users</button>
  <button class="tab" data-tab="meetings">Meetings</button>
  <button class="tab" data-tab="emails">Emails</button>
  <button class="tab" data-tab="bulk">Bulk</button>
</div>

<div class="content" id="content">
  <div class="loader"></div>
</div>

<script src="/js/admin.js"></script>
<script>
let currentTab = 'overview';

(async () => {
  const me = await apiGet('/admin/me');
  if (!me) return;
  document.getElementById('admin-email').textContent = me.admin?.email || '';
  renderTab('overview');
})();

document.getElementById('sign-out').addEventListener('click', async () => {
  await apiPost('/admin-logout');
  location.href = '/admin-login';
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = t.dataset.tab;
    renderTab(currentTab);
  });
});

function showToast(msg, ok = true) {
  const t = document.createElement('div');
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function renderTab(tab) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loader"></div>';
  try {
    if (tab === 'overview') await renderOverview(el);
    else if (tab === 'users') await renderUsers(el);
    else if (tab === 'meetings') await renderMeetings(el);
    else if (tab === 'emails') await renderEmails(el);
    else if (tab === 'bulk') await renderBulk(el);
  } catch (err) { el.innerHTML = `<p style="color:#ef4444">${esc(err.message)}</p>`; }
}

// ========== OVERVIEW ==========
async function renderOverview(el) {
  const s = await apiGet('/admin/stats');
  if (!s) return;

  function barChart(title, items, colors) {
    const max = Math.max(...items.map(i => i.value), 1);
    return `<div class="chart-card"><h3>${title}</h3><div class="bar-chart">${items.map((item, i) => {
      const pct = Math.max(2, (item.value / max) * 100);
      const color = colors[i % colors.length];
      return `<div class="bar-row"><div class="bar-label">${esc(item.label)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${item.value}</div></div></div>`;
    }).join('')}</div></div>`;
  }

  function donutChart(title, items, colors) {
    const total = items.reduce((s, i) => s + i.value, 0) || 1;
    let offset = 0;
    const segments = items.filter(i => i.value > 0).map((item, i) => {
      const pct = (item.value / total) * 100;
      const seg = `<circle cx="50" cy="50" r="40" fill="none" stroke="${colors[i % colors.length]}" stroke-width="18" stroke-dasharray="${pct * 2.51} ${251 - pct * 2.51}" stroke-dashoffset="${-offset * 2.51}" />`;
      offset += pct;
      return seg;
    });
    const legend = items.filter(i => i.value > 0).map((item, i) => `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:${colors[i % colors.length]}"></div>${esc(item.label)}: <strong style="color:#fff">${item.value}</strong></div>`).join('');
    return `<div class="chart-card"><h3>${title}</h3><div class="donut-wrap"><svg width="120" height="120" viewBox="0 0 100 100">${segments.join('')}<text x="50" y="54" text-anchor="middle" fill="#fff" font-family="Archivo" font-size="22" font-weight="800">${total}</text></svg><div class="donut-legend">${legend}</div></div></div>`;
  }

  // Emails by day chart
  function emailsByDayChart(byDay) {
    if (!byDay || !byDay.length) return '<div class="chart-card"><h3>Emails by Day (7 days)</h3><p style="color:#6a6a75;font-size:13px">No data yet</p></div>';
    const days = {};
    const templates = new Set();
    byDay.forEach(r => { if (!days[r.day]) days[r.day] = {}; days[r.day][r.template] = r.n; templates.add(r.template); });
    const tplColors = { magic_link:'#4EA8DE', meeting_request:'#A78BFA', meeting_approved:'#22c55e', meeting_declined:'#ef4444', meeting_cancelled:'#F59E0B', admin_bulk:'#EC672C', admin_notification:'#6a6a75', exhibitor_contact:'#b0b0b8' };
    const sortedDays = Object.keys(days).sort();
    const maxDay = Math.max(...sortedDays.map(d => Object.values(days[d]).reduce((a,b)=>a+b,0)), 1);
    let html = '<div class="chart-card"><h3>Emails by Day (7 days)</h3>';
    html += '<div class="bar-chart">';
    sortedDays.forEach(day => {
      const total = Object.values(days[day]).reduce((a,b)=>a+b,0);
      const pct = Math.max(2, (total / maxDay) * 100);
      const label = new Date(day+'T12:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      let segments = '';
      let segOffset = 0;
      [...templates].forEach(t => {
        const v = days[day][t] || 0;
        if (v > 0) {
          const segPct = (v / total) * 100;
          segments += `<div style="width:${segPct}%;background:${tplColors[t]||'#6a6a75'};height:100%;display:inline-block" title="${t}: ${v}"></div>`;
        }
      });
      html += `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track" style="display:flex;overflow:hidden">${segments}</div><div class="bar-value">${total}</div></div>`;
    });
    html += '</div>';
    // Legend
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">';
    [...templates].forEach(t => { html += `<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#b0b0b8"><div style="width:8px;height:8px;border-radius:2px;background:${tplColors[t]||'#6a6a75'}"></div>${t.replace(/_/g,' ')}</div>`; });
    html += '</div></div>';
    return html;
  }

  const typeColors = ['#4EA8DE', '#A78BFA', '#F59E0B', '#EC672C'];
  const statusColors = ['#22c55e', '#EC672C', '#ef4444', '#ef4444', '#6a6a75'];
  const tplPieColors = ['#4EA8DE', '#A78BFA', '#22c55e', '#ef4444', '#F59E0B', '#EC672C', '#6a6a75', '#b0b0b8'];

  const upHrs = Math.floor((s.system?.uptime_seconds || 0) / 3600);
  const upMin = Math.floor(((s.system?.uptime_seconds || 0) % 3600) / 60);
  const dbMB = ((s.system?.db_size_bytes || 0) / 1048576).toFixed(1);

  el.innerHTML = `
    <h2>Overview</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${s.users.total}</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-num">${s.meetings.total}</div><div class="stat-label">Total Meetings</div></div>
      <div class="stat-card"><div class="stat-num">${s.emails.last_24h.sent}</div><div class="stat-label">Emails (24h)</div></div>
      <div class="stat-card"><div class="stat-num">${(s.emails.magic_link_click_rate_7d * 100).toFixed(0)}%</div><div class="stat-label">Link Click Rate (7d)</div></div>
    </div>

    <div class="chart-row">
      ${donutChart('Users by Type', [
        { label: 'Hotels', value: s.users.by_type.hotel || 0 },
        { label: 'Agencies', value: s.users.by_type.agent || 0 },
        { label: 'Exhibitors', value: s.users.by_type.exhibitor || 0 },
        { label: 'Admins', value: s.users.by_type.admin || 0 }
      ], typeColors)}
      ${donutChart('Meetings by Status', [
        { label: 'Approved', value: s.meetings.by_status.approved || 0 },
        { label: 'Pending', value: s.meetings.by_status.pending || 0 },
        { label: 'Declined', value: s.meetings.by_status.declined || 0 },
        { label: 'Cancelled', value: s.meetings.by_status.cancelled || 0 },
        { label: 'Expired', value: s.meetings.by_status.expired || 0 }
      ], statusColors)}
    </div>

    <div class="chart-row">
      ${barChart('Verification Status', [
        { label: 'Verified', value: s.users.verified },
        { label: 'Unverified', value: s.users.unverified },
        { label: 'Inactive', value: s.users.inactive }
      ], ['#22c55e', '#EC672C', '#6a6a75'])}
      ${barChart('Slot Distribution', [
        { label: 'Free', value: s.slots.by_status.free || 0 },
        { label: 'Booked', value: s.slots.by_status.booked || 0 },
        { label: 'Held', value: s.slots.by_status.held || 0 },
        { label: 'Blocked', value: s.slots.by_status.blocked || 0 }
      ], ['#22c55e', '#EC672C', '#A78BFA', '#6a6a75'])}
    </div>

    <div class="chart-row">
      ${donutChart('Emails by Template (7 days)',
        Object.entries(s.emails.by_template_7d || {}).map(([k,v]) => ({ label: k.replace(/_/g,' '), value: v })),
        tplPieColors
      )}
      <div class="chart-card">
        <h3>Email Health (7 days)</h3>
        <div class="stat-grid" style="grid-template-columns:1fr 1fr;margin-bottom:0">
          <div class="stat-card" style="border:none;padding:8px"><div class="stat-num" style="color:#22c55e">${s.emails.last_7d.sent}</div><div class="stat-label">Sent</div></div>
          <div class="stat-card" style="border:none;padding:8px"><div class="stat-num" style="color:#ef4444">${s.emails.last_7d.errored}</div><div class="stat-label">Errored</div></div>
        </div>
      </div>
    </div>

    ${emailsByDayChart(s.emails.by_day)}

    <h2 style="margin-top:32px">System Health</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${upHrs}h ${upMin}m</div><div class="stat-label">Uptime</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${s.system?.memory_mb || 0} MB</div><div class="stat-label">Memory (RSS)</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${dbMB} MB</div><div class="stat-label">Database Size</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${s.system?.node_version || '-'}</div><div class="stat-label">Node Version</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${s.system?.action_tokens || 0}</div><div class="stat-label">Action Tokens</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:24px">${s.system?.expired_tokens || 0}</div><div class="stat-label">Expired Tokens</div></div>
    </div>
  `;
}

// ========== USERS ==========
async function renderUsers(el) {
  const d = await apiGet('/admin/users');
  if (!d) return;
  el.innerHTML = `
    <h2>Users (${d.users.length})</h2>
    <div class="filter-row"><input id="user-search" placeholder="Search by name, email, country..."></div>
    <div class="scroll-x"><table><thead><tr><th>Type</th><th>Organization</th><th>Email</th><th>Country</th><th>Verified</th><th>Active</th><th>Created</th><th>Actions</th></tr></thead><tbody id="user-rows"></tbody></table></div>
  `;
  const tbody = document.getElementById('user-rows');
  function render(users) {
    tbody.innerHTML = users.map(u => `<tr>
      <td>${typeBadge(u.type)}</td>
      <td>${esc(u.org_name)}</td>
      <td style="font-size:12px">${esc(u.email)}</td>
      <td>${esc(u.country||'')}</td>
      <td>${u.email_verified_at ? badge('Yes','#22c55e') : badge('No','#ef4444')}</td>
      <td>${u.active ? badge('Active','#22c55e') : badge('Inactive','#ef4444')}</td>
      <td style="font-size:12px;color:#6a6a75">${fmtDt(u.created_at)}</td>
      <td style="min-width:240px">
        <button class="btn-sm" onclick="adminUserAction('edit',${u.id})" title="Edit this user's profile">Edit</button>
        ${!u.email_verified_at ? `<button class="btn-sm primary" onclick="adminUserAction('verify',${u.id})" title="Mark email as verified">Verify</button>` : ''}
        <button class="btn-sm" onclick="adminUserAction('${u.active?'deactivate':'activate'}',${u.id})" title="${u.active?'Deactivate this user (block login)':'Reactivate this user'}">${u.active?'Deactivate':'Activate'}</button>
        <button class="btn-sm" onclick="adminUserAction('resend-magic',${u.id})" title="Send a fresh magic login link to this user's email">Resend Link</button>
        <button class="btn-sm" onclick="adminUserAction('regenerate-slots',${u.id})" title="Delete free/blocked slots and recreate based on user type and region">Regen Slots</button>
        <div style="margin-top:4px"></div><button class="btn-sm danger" onclick="adminUserAction('delete',${u.id})" title="Permanently delete this user and all their data">Delete</button>
      </td>
    </tr>`).join('');
  }
  render(d.users);
  document.getElementById('user-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    render(d.users.filter(u => (u.org_name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q) || (u.country||'').toLowerCase().includes(q) || (u.contact_name||'').toLowerCase().includes(q)));
  });
}

window.adminUserAction = async function(action, id) {
  try {
    if (action === 'edit') {
      const d = await apiGet('/admin/users/' + id);
      if (!d) return;
      const u = d.user;
      const modal = document.createElement('div');
      modal.className = 'modal-bg';
      modal.innerHTML = `<div class="modal-box">
        <button class="modal-close" onclick="this.closest('.modal-bg').remove()">&times;</button>
        <h2 style="margin-bottom:16px">Edit User #${u.id}</h2>
        <form id="edit-user-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="field"><label>Type</label><select name="type"><option ${u.type==='hotel'?'selected':''}>hotel</option><option ${u.type==='agent'?'selected':''}>agent</option><option ${u.type==='exhibitor'?'selected':''}>exhibitor</option><option ${u.type==='admin'?'selected':''}>admin</option></select></div>
            <div class="field"><label>Region</label><select name="region"><option value="">None</option><option value="UAE" ${u.region==='UAE'?'selected':''}>UAE</option><option value="INTL" ${u.region==='INTL'?'selected':''}>INTL</option></select></div>
            <div class="field"><label>Organization</label><input name="org_name" value="${esc(u.org_name||'')}"></div>
            <div class="field"><label>Contact Name</label><input name="contact_name" value="${esc(u.contact_name||'')}"></div>
            <div class="field"><label>Email</label><input name="email" value="${esc(u.email||'')}"></div>
            <div class="field"><label>Phone</label><input name="phone" value="${esc(u.phone||'')}"></div>
            <div class="field"><label>Country</label><input name="country" value="${esc(u.country||'')}"></div>
            <div class="field"><label>City</label><input name="city" value="${esc(u.city||'')}"></div>
            <div class="field"><label>Website</label><input name="website" value="${esc(u.website||'')}"></div>
            <div class="field"><label>Timezone</label><input name="timezone" value="${esc(u.timezone||'')}"></div>
            <div class="field"><label>Attendance</label><select name="attendance_mode"><option value="">-</option><option value="on_site" ${u.attendance_mode==='on_site'?'selected':''}>On-site</option><option value="remote" ${u.attendance_mode==='remote'?'selected':''}>Remote</option></select></div>
            <div class="field"><label>Star Rating</label><input name="star_rating" type="number" value="${u.star_rating||''}"></div>
          </div>
          <div class="field"><label>Description</label><textarea name="description" rows="3">${esc(u.description||'')}</textarea></div>
          <div style="display:flex;gap:12px;margin-top:16px">
            <button type="submit" class="btn-sm primary">Save Changes</button>
            <button type="button" class="btn-sm" onclick="this.closest('.modal-bg').remove()">Cancel</button>
          </div>
        </form>
      </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const body = Object.fromEntries(fd.entries());
        if (body.star_rating) body.star_rating = parseInt(body.star_rating);
        else delete body.star_rating;
        try {
          await apiPatch('/admin/users/' + id, body);
          showToast('User updated');
          modal.remove();
          renderTab('users');
        } catch (err) { showToast(err.message, false); }
      });
      return;
    }
    if (action === 'delete') {
      if (!confirm('Delete this user permanently? This cannot be undone.')) return;
      await apiDelete('/admin/users/' + id);
    } else {
      await apiPost('/admin/users/' + id + '/' + action);
    }
    showToast('Done');
    renderTab('users');
  } catch (err) { showToast(err.message, false); }
};

// ========== MEETINGS ==========
async function renderMeetings(el) {
  el.innerHTML = `
    <h2>Meetings</h2>
    <div class="filter-row"><select id="mtg-status"><option value="">All statuses</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="declined">Declined</option><option value="cancelled">Cancelled</option><option value="expired">Expired</option></select></div>
    <div class="scroll-x"><table><thead><tr><th>ID</th><th>Day</th><th>Time</th><th>Requester</th><th>Recipient</th><th>Status</th><th>Teams</th><th>Actions</th></tr></thead><tbody id="mtg-rows"></tbody></table></div>
  `;
  async function load() {
    const status = document.getElementById('mtg-status').value;
    const d = await apiGet('/admin/meetings' + (status ? '?status=' + status : ''));
    if (!d) return;
    document.getElementById('mtg-rows').innerHTML = d.meetings.map(m => `<tr>
      <td>${m.id}</td>
      <td>${m.day||''}</td>
      <td style="font-size:12px">${fmtDt(m.start_time)}</td>
      <td>${esc(m.requester_org||'')} <span style="color:#6a6a75;font-size:11px">${esc(m.requester_name||'')}</span></td>
      <td>${esc(m.recipient_org||'')} <span style="color:#6a6a75;font-size:11px">${esc(m.recipient_name||'')}</span></td>
      <td>${statusBadge(m.status)}</td>
      <td>${m.teams_join_url ? '<a href="'+esc(m.teams_join_url)+'" target="_blank" style="color:#EC672C;font-size:11px">Link</a>' : '-'}</td>
      <td style="white-space:nowrap">
        ${m.status==='pending' ? `<button class="btn-sm primary" onclick="adminMtgAction('force-approve',${m.id})">Approve</button>` : ''}
        ${!['cancelled','expired','declined'].includes(m.status) ? `<button class="btn-sm danger" onclick="adminMtgAction('force-cancel',${m.id})">Cancel</button>` : ''}
      </td>
    </tr>`).join('');
  }
  load();
  document.getElementById('mtg-status').addEventListener('change', load);
}

window.adminMtgAction = async function(action, id) {
  if (!confirm('Are you sure?')) return;
  try {
    await apiPost('/admin/meetings/' + id + '/' + action);
    showToast('Done');
    renderTab('meetings');
  } catch (err) { showToast(err.message, false); }
};

// ========== EMAILS ==========
async function renderEmails(el) {
  el.innerHTML = `
    <h2>Email Log</h2>
    <div class="filter-row">
      <input id="email-search" placeholder="Search subject or recipient...">
      <select id="email-tpl"><option value="">All templates</option><option value="magic_link">Magic Link</option><option value="meeting_request">Request</option><option value="meeting_approved">Approved</option><option value="meeting_declined">Declined</option><option value="meeting_cancelled">Cancelled</option><option value="admin_bulk">Bulk</option></select>
      <select id="email-status"><option value="">All</option><option value="sent">Sent</option><option value="failed">Failed</option></select>
    </div>
    <div class="scroll-x"><table><thead><tr><th>Sent</th><th>To</th><th>Subject</th><th>Template</th><th>Status</th></tr></thead><tbody id="email-rows"></tbody></table></div>
  `;
  async function load() {
    const q = document.getElementById('email-search').value;
    const tpl = document.getElementById('email-tpl').value;
    const st = document.getElementById('email-status').value;
    let url = '/admin/emails?limit=100';
    if (q) url += '&q=' + encodeURIComponent(q);
    if (tpl) url += '&template=' + tpl;
    if (st) url += '&status=' + st;
    const d = await apiGet(url);
    if (!d) return;
    document.getElementById('email-rows').innerHTML = d.emails.map(e => `<tr>
      <td style="font-size:12px;color:#6a6a75;white-space:nowrap">${fmtDt(e.sent_at)}</td>
      <td style="font-size:12px">${esc(e.to_email)}</td>
      <td>${esc(e.subject||'')}</td>
      <td>${e.template ? badge(e.template,'#6a6a75') : '-'}</td>
      <td>${e.status==='sent' ? badge('sent','#22c55e') : badge(e.status||'?','#ef4444')}</td>
    </tr>`).join('');
  }
  load();
  document.getElementById('email-search').addEventListener('input', load);
  document.getElementById('email-tpl').addEventListener('change', load);
  document.getElementById('email-status').addEventListener('change', load);
}

// ========== BULK ==========
async function renderBulk(el) {
  el.innerHTML = `
    <h2>Bulk Operations</h2>
    <div class="card">
      <h3>Resend Magic Link to Unverified Users</h3>
      <p style="color:#6a6a75;margin-bottom:8px;font-size:13px">Sends a fresh sign-in link to every active user who hasn't clicked their verification link yet. Useful after initial invitations.</p>
      <p style="color:#6a6a75;margin-bottom:12px;font-size:12px">Emails are sent at ~7/second with a 150ms delay between each. Large batches may take a few minutes.</p>
      <button class="btn-sm primary" id="bulk-resend">Resend to All Unverified</button>
      <div id="bulk-resend-result" style="margin-top:12px;font-size:13px"></div>
    </div>
    <div class="card" style="margin-top:24px">
      <h3>Send Custom Email</h3>
      <p style="color:#6a6a75;margin-bottom:12px;font-size:13px">Send a branded email to a specific audience. The HTML you write will be wrapped in the standard Engage by Elevate email template (dark theme, logo header, footer links).</p>
      <div class="field"><label>Audience</label><select id="bulk-audience" style="width:100%;padding:8px;background:#141416;border:1px solid #27272a;border-radius:4px;color:#fff"><option value="all">All active users (excluding admins)</option><option value="hotel">Hotels only</option><option value="agent">Agencies only</option><option value="exhibitor">Exhibitors only</option><option value="unverified">Unverified users only</option></select></div>
      <div class="field"><label>Subject Line</label><input id="bulk-subject" style="width:100%" placeholder="e.g. Important update for Engage by Elevate attendees"></div>
      <div class="field"><label>Email Body (HTML — will be wrapped in branded template)</label><textarea id="bulk-html" rows="8" placeholder="<h2>Hello!</h2><p>Your content here. Use standard HTML tags.</p><p>This will appear inside the branded email shell with logo, header, and footer.</p>"></textarea></div>
      <div style="margin-bottom:12px;padding:12px;background:#1a1a1d;border-radius:4px;font-size:12px;color:#6a6a75">
        <strong style="color:#b0b0b8">Dynamic variables:</strong> Use these in subject or body — they'll be replaced per recipient:<br>
        <code style="color:#EC672C">{{name}}</code> — contact name &nbsp;
        <code style="color:#EC672C">{{org_name}}</code> — organization &nbsp;
        <code style="color:#EC672C">{{email}}</code> — email &nbsp;
        <code style="color:#EC672C">{{type}}</code> — hotel/agent/exhibitor &nbsp;
        <code style="color:#EC672C">{{country}}</code> — country &nbsp;
        <code style="color:#EC672C">{{city}}</code> — city
      </div>
      <div class="field"><label>Plain Text Version (optional — for email clients that don't support HTML)</label><textarea id="bulk-text" rows="4" placeholder="Plain text fallback. If empty, recipients will see the HTML version."></textarea></div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn-sm primary" id="bulk-send">Send Email</button>
        <button class="btn-sm" id="bulk-preview" style="margin-left:8px">Preview</button>
        <span id="bulk-count" style="font-size:12px;color:#6a6a75"></span>
      </div>
      <div id="bulk-send-result" style="margin-top:12px;font-size:13px"></div>
    </div>
  `;
  document.getElementById('bulk-resend').addEventListener('click', async () => {
    if (!confirm('Resend magic link to all unverified users?')) return;
    try {
      const r = await apiPost('/admin/bulk/resend-unverified', { confirm: true });
      document.getElementById('bulk-resend-result').textContent = 'Sent: ' + r.sent + (r.errors?.length ? ', Errors: ' + r.errors.length : '');
    } catch (err) { document.getElementById('bulk-resend-result').textContent = err.message; }
  });
  document.getElementById('bulk-send').addEventListener('click', async () => {
    const audience = document.getElementById('bulk-audience').value;
    const subject = document.getElementById('bulk-subject').value;
    const html = document.getElementById('bulk-html').value;
    const text = document.getElementById('bulk-text').value;
    if (!subject || !html) { showToast('Subject and HTML required', false); return; }
    if (!confirm('Send email to audience: ' + audience + '?')) return;
    try {
      const r = await apiPost('/admin/bulk/email', { audience, subject, html, text, confirm: true });
      document.getElementById('bulk-send-result').textContent = 'Sent: ' + r.sent + (r.errors?.length ? ', Errors: ' + r.errors.length : '');
    } catch (err) { document.getElementById('bulk-send-result').textContent = err.message; }
  });
  document.getElementById('bulk-preview').addEventListener('click', () => {
    const html = document.getElementById('bulk-html').value;
    if (!html) { showToast('Write some HTML first', false); return; }
    const modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.innerHTML = '<div class="modal-box" style="max-width:640px"><button class="modal-close" onclick="this.closest(\'.modal-bg\').remove()">&times;</button><h2 style="margin-bottom:12px">Email Preview</h2><p style="font-size:12px;color:#6a6a75;margin-bottom:12px">This shows the raw HTML body. The actual email will be wrapped in the branded Engage by Elevate template.</p><iframe class="preview-frame" srcdoc="' + html.replace(/"/g, '&quot;') + '"></iframe></div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  });
}
</script>
</body>
</html>

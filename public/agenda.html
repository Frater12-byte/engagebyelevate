<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Agenda — Engage by Elevate 2026</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><img src="/img/logo.png" alt="Elevate"><span class="brand-engage"><span>engage</span></span></a>
    <div class="nav-links" id="nav-links">
      <a href="/agenda" class="active">Agenda</a>
      <a href="/directory">Directory</a>
      <a id="nav-auth-link" href="/login.html">Sign in</a>
      <a href="/signup.html" class="nav-cta">Register Now</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</nav>

<section class="hero" style="padding:48px 0 40px">
  <div class="container">
    <div class="eyebrow" style="margin-bottom:12px">Event Schedule</div>
    <h1 style="font-size:clamp(2rem,7vw,3.5rem)">Agenda.</h1>
    <p style="margin-top:8px;color:var(--ink-soft);max-width:56ch">The full three-day programme — keynotes, sessions, and 1:1 meeting blocks.</p>
  </div>
</section>

<section style="padding-top:0">
  <div class="container">
    <div id="agenda-content">
      <div class="loader" style="margin:80px auto;display:block"></div>
    </div>
  </div>
</section>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Home</span></a>
    <a href="/agenda" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Events</span></a>
    <a href="/directory"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>Directory</span></a>
    <a href="/dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>Profile</span></a>
  </div>
</nav>

<script src="/js/common.js"></script>
<script>
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
  });

  const DAY_THEMES = { 1: 'UAE Hotels · Opening', 2: 'UAE Hotels · Continued', 3: 'International Hotels' };

  (async () => {
    const me = await getMe();
    if (me) { document.getElementById('nav-auth-link').textContent = 'Dashboard'; document.getElementById('nav-auth-link').href = '/dashboard'; }

    const { agenda } = await api.get('/api/public/agenda');
    const container = document.getElementById('agenda-content');
    const days = Object.keys(agenda).sort();

    if (!days.length) { container.innerHTML = `<div class="empty-state"><h3>Agenda coming soon</h3></div>`; return; }

    container.innerHTML = days.map((day, idx) => {
      const sessions = agenda[day];
      const d = new Date(day);
      const dateStr = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
      return `
        <div class="agenda-day">
          <div class="agenda-day-head">
            <div class="day-num">${String(idx + 1).padStart(2, '0')}</div>
            <div class="day-date">${dateStr}</div>
            <div class="day-theme">${DAY_THEMES[idx+1] || ''}</div>
          </div>
          ${sessions.map(s => `
            <div class="agenda-item">
              <div class="time">${fmtTime(s.start_time)}<small>--- ${fmtTime(s.end_time)}</small></div>
              <div>
                <h4>${escapeHtml(s.title)}</h4>
                <div class="session-meta">${[s.speaker, s.organization].filter(Boolean).map(escapeHtml).join(' · ')}${s.location ? ' · <span class="badge badge-gold">' + escapeHtml(s.location) + '</span>' : ''}${s.is_hybrid ? ' · <span class="badge badge-gold">Hybrid</span>' : ''}${s.is_online ? ' · <span class="badge badge-ink">Online</span>' : ''}</div>
                ${s.description ? `<p style="color:var(--ink-soft);font-size:14px;margin-top:6px">${escapeHtml(s.description)}</p>` : ''}
              </div>
              <div><span class="badge ${({'opening':'badge-gold','keynote':'badge-ink','tourism_board':'badge','networking':'badge-gold'})[s.type] || ''}">${({'opening':'Opening','keynote':'Keynote','tourism_board':'Open session','break':'Break','networking':'Networking'})[s.type] || s.type}</span></div>
            </div>
          `).join('')}
        </div>`;
    }).join('');

    container.insertAdjacentHTML('beforeend', `
      <div class="notice" style="margin-top:48px">
        <p><strong>1:1 meetings run between sessions.</strong> Each is 20 minutes. Book from your dashboard. Slots lock 48h before start.</p>
      </div>
    `);

    if (!me) {
      container.insertAdjacentHTML('beforeend', `
        <div class="login-prompt">
          <h3>Your Personal Agenda</h3>
          <p>Sign in to view your personal schedule, manage meetings, and book new slots.</p>
          <a href="/login.html" class="btn btn-small btn-inline">Sign In</a>
        </div>
      `);
    }
  })();
</script>
</body>
</html>

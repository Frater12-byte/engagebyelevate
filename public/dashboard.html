<script src="/js/common.js"></script>
<script src="/js/form-data.js"></script>
<script>
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('nav-toggle').classList.toggle('open');
});

let me = null, agenda = null, meetings = [];

(async () => {
  me = await getMe();
  if (!me) return location.href = '/login.html';

  document.getElementById('user-type').textContent = me.type === 'hotel' ? 'Hotel' : me.type === 'agent' ? 'Agency' : me.type;
  document.getElementById('user-org').textContent = me.org_name;
  document.getElementById('user-sub').textContent = `${me.contact_name} · ${me.email}${me.region ? ' · ' + me.region : ''}`;

  await loadAll();

  // Check URL params for deep-link (e.g. ?tab=book&with=7)
  const urlParams = new URLSearchParams(location.search);
  const deepTab = urlParams.get('tab');
  const deepWith = urlParams.get('with');

  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  if (deepTab) {
    const tabBtn = document.querySelector(`[data-tab="${deepTab}"]`);
    if (tabBtn) {
      tabBtn.click();
      // If deep-linking to book with a specific user, open their availability modal after render
      if (deepTab === 'book' && deepWith) {
        setTimeout(() => { if (window.openAvailabilityModal) openAvailabilityModal(parseInt(deepWith, 10)); }, 500);
      }
    }
  } else {
    renderAgenda();
  }

  document.querySelectorAll('.dash-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      const target = 'tab-' + tab.dataset.tab;
      document.getElementById(target).style.display = 'block';
      if (tab.dataset.tab === 'agenda') renderAgenda();
      else if (tab.dataset.tab === 'meetings') renderMeetings();
      else if (tab.dataset.tab === 'book') renderBookTab();
      else if (tab.dataset.tab === 'profile') renderProfile();
    });
  });

  document.getElementById('edit-profile-link').addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelector('[data-tab="profile"]').click();
  });

  document.getElementById('nav-signout').addEventListener('click', async (e) => {
    e.preventDefault();
    document.cookie = 'logged_in=; Max-Age=0; path=/';
    await api.post('/auth/logout');
    location.href = '/';
  });

  setInterval(loadAll, 30000);
})();

async function loadAll() {
  try {
    const [a, m] = await Promise.all([
      api.get('/api/me/agenda'),
      api.get('/api/me/meetings')
    ]);
    agenda = a;
    meetings = m.meetings;
    const pending = meetings.filter(x => x.status === 'pending' && x.recipient_id === me.id).length;
    const badge = document.getElementById('badge-pending');
    if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
    else badge.style.display = 'none';
    // Update nav badge
    const dashLink = document.getElementById('nav-dash');
    if (dashLink) {
      const existing = dashLink.querySelector('.nav-notif');
      if (existing) existing.remove();
      if (pending > 0) dashLink.insertAdjacentHTML('beforeend', `<span class="nav-notif">${pending}</span>`);
    }
  } catch (err) { console.error(err); }
}

function renderAgenda() {
  const el = document.getElementById('tab-agenda');
  if (!agenda || Object.keys(agenda.agenda).length === 0) {
    el.innerHTML = `<div class="empty-state"><h3>No schedule yet</h3><p>Your slots will appear here once the event dates are active.</p></div>`;
    return;
  }

  const days = Object.keys(agenda.agenda).sort();
  el.innerHTML = days.map(day => {
    const slots = agenda.agenda[day];
    return `
      <div style="margin-bottom:40px">
        <div class="agenda-day-head">
          <div class="day-date">${fmtDate(day)}</div>
          <div class="day-theme">${slots.filter(s => s.status === 'booked').length} booked · ${slots.filter(s => s.status === 'free').length} free</div>
        </div>
        <div class="slot-grid">
          ${slots.map(s => {
            const locked = isLocked(s.start_time);
            const cls = `slot ${s.status}${locked ? ' locked' : ''}`;
            const label = s.status === 'booked' ? (s.other_org || 'Meeting') :
                          s.status === 'held' ? 'Pending' :
                          s.status === 'blocked' ? 'Closed' :
                          s.status === 'free' ? (locked ? 'Locked' : 'Free') : s.status;
            const canToggle = !locked && (s.status === 'free' || s.status === 'blocked');
            const onclick = s.meeting_id_full ? `onclick="showMeetingDetail(${s.meeting_id_full})"` :
                            canToggle ? `onclick="toggleSlot(${s.id})"` : '';
            return `<div class="${cls}" ${onclick} ${canToggle ? 'title="Click to close/open this slot"' : ''}>
              <div class="slot-time">${fmtTime(s.start_time)}</div>
              <div class="slot-status">${escapeHtml(label)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function isLocked(startTime) {
  const hrs = (new Date(startTime) - new Date()) / 3600000;
  return hrs < 48;
}

function localTzNote(start, end) {
  const userTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (userTz === 'Asia/Dubai') return '';
  const fmt = (iso) => new Date(iso).toLocaleTimeString('en-GB', { timeZone: userTz, hour: '2-digit', minute: '2-digit' });
  const tzAbbr = new Date(start).toLocaleTimeString('en-GB', { timeZone: userTz, timeZoneName: 'short' }).split(' ').pop();
  return ` · ${fmt(start)} – ${fmt(end)} ${tzAbbr}`;
}

function renderMeetings() {
  const el = document.getElementById('tab-meetings');
  if (!meetings.length) {
    el.innerHTML = `<div class="empty-state"><h3>No meetings yet</h3><p>Browse the directory and request meetings with hotels or agencies.</p><a href="/directory" class="btn" style="margin-top:20px">Open Directory</a></div>`;
    return;
  }

  const grouped = { pending_incoming: [], pending_outgoing: [], approved: [], past: [], other: [] };
  const now = new Date();
  for (const m of meetings) {
    const isPast = new Date(m.start_time) < now;
    if (m.status === 'pending' && m.recipient_id === me.id) grouped.pending_incoming.push(m);
    else if (m.status === 'pending' && m.requester_id === me.id) grouped.pending_outgoing.push(m);
    else if (m.status === 'approved' && !isPast) grouped.approved.push(m);
    else if (m.status === 'approved' && isPast) grouped.past.push(m);
    else grouped.other.push(m);
  }

  el.innerHTML = `
    ${section('Awaiting your response', grouped.pending_incoming, 'incoming')}
    ${section('Waiting on them', grouped.pending_outgoing, 'outgoing')}
    ${section('Confirmed meetings', grouped.approved, 'approved')}
    ${section('Past meetings', grouped.past, 'past')}
    ${section('Declined / cancelled / expired', grouped.other, 'other')}
  `;

  el.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      btn.disabled = true; btn.textContent = '...';
      try {
        if (action === 'approve') await api.post(`/api/meetings/${id}/approve`);
        else if (action === 'decline') {
          const reason = prompt('Optional: reason for declining?') || '';
          await api.post(`/api/meetings/${id}/decline`, { reason });
        }
        else if (action === 'cancel') {
          if (!confirm('Cancel this meeting? The slot will be freed for both sides.')) {
            btn.disabled = false; btn.textContent = 'Cancel';
            return;
          }
          await api.post(`/api/meetings/${id}/cancel`);
        }
        toast('Done', 'success');
        await loadAll();
        renderMeetings();
        renderAgenda();
      } catch (err) {
        toast(err.message, 'error');
        btn.disabled = false;
      }
    });
  });
}

function section(title, list, kind) {
  if (!list.length) return '';
  return `
    <div style="margin-bottom:32px">
      <h3 style="margin-bottom:12px">${title} <span class="text-muted" style="font-family:var(--font-body);font-size:14px">(${list.length})</span></h3>
      ${list.map(m => meetingCard(m, kind)).join('')}
    </div>
  `;
}

function meetingCard(m, kind) {
  const otherOrg = m.requester_id === me.id ? m.recipient_org : m.requester_org;
  const otherName = m.requester_id === me.id ? m.recipient_name : m.requester_name;
  const locked = isLocked(m.start_time);

  let calendarHtml = '';
  let btnsHtml = '';

  if (kind === 'incoming') {
    btnsHtml = `
      <button class="btn btn-small btn-success" data-action="approve" data-id="${m.id}" ${locked ? 'disabled' : ''}>Approve</button>
      <button class="btn btn-small btn-danger" data-action="decline" data-id="${m.id}">Decline</button>
    `;
  } else if (kind === 'outgoing') {
    btnsHtml = `<button class="btn btn-small btn-ghost" data-action="cancel" data-id="${m.id}">Cancel</button>`;
  } else if (kind === 'approved') {
    const gcalStart = new Date(m.start_time).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    const gcalEnd = new Date(new Date(m.start_time).getTime() + 20*60000).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    const gcalSubject = encodeURIComponent(`Engage by Elevate — ${otherOrg}`);
    const gcalDetails = encodeURIComponent(m.teams_join_url ? `Join Teams: ${m.teams_join_url}` : 'Engage by Elevate meeting');
    const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${gcalSubject}&dates=${gcalStart}/${gcalEnd}&details=${gcalDetails}&location=${encodeURIComponent(m.teams_join_url || 'Microsoft Teams')}`;
    const outlookUrl = `https://outlook.office.com/calendar/0/action/compose?subject=${gcalSubject}&startdt=${encodeURIComponent(m.start_time)}&enddt=${encodeURIComponent(new Date(new Date(m.start_time).getTime()+20*60000).toISOString())}&body=${gcalDetails}&location=${encodeURIComponent(m.teams_join_url || 'Microsoft Teams')}`;

    calendarHtml = `
      <div class="meeting-card-calendar">
        <div class="cal-label">Save invite</div>
        <div class="cal-icons">
          <a href="${outlookUrl}" target="_blank" title="Outlook"><img src="/img/icon-outlook.png" width="32" height="32" alt="Outlook" style="border-radius:4px"></a>
          <a href="${gcalUrl}" target="_blank" title="Google Calendar"><img src="/img/icon-gcal.svg" width="32" height="32" alt="Google Calendar"></a>
          <a href="/api/meetings/${m.id}/calendar.ics" download title="Download .ics"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--ink-soft)" stroke-width="1.5"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg></a>
        </div>
      </div>`;

    btnsHtml = `
      ${m.teams_join_url ? `<a class="btn btn-small" href="${m.teams_join_url}" target="_blank">Join Teams</a>` : ''}
      ${!locked ? `<button class="btn btn-small btn-ghost" data-action="cancel" data-id="${m.id}">Cancel</button>` : ''}
    `;
  }

  const statusDot = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:${m.status === 'approved' ? 'var(--success)' : m.status === 'pending' ? 'var(--orange)' : 'var(--ink-muted)'}"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>${m.status}</span>`;

  return `
    <div class="meeting-card card-${m.status}">
      <div class="meeting-card-body">
        <div class="meeting-card-info">
          <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);font-weight:700">${fmtDate(m.start_time)}</div>
          <div style="font-size:14px;color:var(--ink-muted);margin-top:3px">${fmtTime(m.start_time)} – ${fmtTime(m.end_time)} GST${localTzNote(m.start_time, m.end_time)}</div>
          <h4 style="margin-top:8px">${escapeHtml(otherOrg)}</h4>
          <div class="meeting-meta">${escapeHtml(otherName || '')} · ${statusDot}${locked ? ' · <span class="badge">Locked</span>' : ''}</div>
          ${m.message && kind === 'incoming' ? `<div class="notice" style="margin-top:12px;margin-bottom:0;padding:12px 16px"><p style="font-style:italic;font-size:13px">"${escapeHtml(m.message)}"</p></div>` : ''}
          ${m.decline_reason ? `<div style="margin-top:8px;font-size:13px;color:var(--ink-muted)">Reason: ${escapeHtml(m.decline_reason)}</div>` : ''}
        </div>
        ${calendarHtml}
        <div class="meeting-card-btns">${btnsHtml}</div>
      </div>
    </div>
  `;
}

async function renderBookTab() {
  const el = document.getElementById('tab-book');
  el.innerHTML = '<div class="loader" style="margin:40px auto;display:block"></div>';

  // Load all participants, exclude self
  const [hRes, aRes, eRes, bRes] = await Promise.all([
    api.get('/api/public/hotels'),
    api.get('/api/public/agents'),
    api.get('/api/public/exhibitors'),
    api.get('/api/public/tourism-boards')
  ]);
  // Merge exhibitor users + tourism boards (boards get a synthetic type)
  const boardsAsExhibitors = (bRes.boards || []).map(b => ({
    id: 'board-' + b.id, type: 'exhibitor', org_name: b.name,
    country: b.country, description: b.description, logo_url: b.logo_url,
    contact_email: b.contact_email,
    _isBoard: true
  }));
  const allOthers = [
    ...(hRes.hotels || []),
    ...(aRes.agents || []),
    ...(eRes.exhibitors || []),
    ...boardsAsExhibitors
  ].filter(o => o.id !== me.id);

  el.innerHTML = `
    <h3 style="margin-bottom:8px">Book a meeting</h3>
    <p class="text-muted" style="margin-bottom:16px">Select who you'd like to meet. You'll see their live availability alongside yours.</p>
    <div class="dash-tabs" style="margin-bottom:12px">
      <button class="dash-tab active" data-bookfilter="all">All</button>
      <button class="dash-tab" data-bookfilter="hotel">Hotels</button>
      <button class="dash-tab" data-bookfilter="agent">Agencies</button>
      <button class="dash-tab" data-bookfilter="exhibitor">Exhibitors</button>
    </div>
    <input id="book-search" placeholder="Search by name or country..." style="margin-bottom:16px">
    <div id="book-list" class="directory-grid"></div>
  `;

  let bookTypeFilter = 'all';
  document.querySelectorAll('[data-bookfilter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-bookfilter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bookTypeFilter = btn.dataset.bookfilter;
      renderList();
    });
  });

  const list = document.getElementById('book-list');
  const renderList = () => {
    const q = document.getElementById('book-search').value.toLowerCase();
    const filtered = allOthers.filter(o => {
      if (bookTypeFilter !== 'all' && o.type !== bookTypeFilter) return false;
      if (!q) return true;
      return (o.org_name || '').toLowerCase().includes(q) || (o.country || '').toLowerCase().includes(q);
    });
    list.innerHTML = filtered.map(o => {
      const typeClass = o.type === 'hotel' ? 'card-hotel' : o.type === 'exhibitor' ? 'card-exhibitor' : 'card-agent';
      const typeColor = o.type === 'hotel' ? 'type-hotel' : o.type === 'exhibitor' ? 'type-exhibitor' : 'type-agent';
      const typeLabel = o.type === 'hotel' ? 'Hotel' : o.type === 'exhibitor' ? 'Exhibitor' : 'Agency';
      const typeIcon = o.type === 'agent'
        ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>'
        : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>';
      const isExhibitor = o._isBoard || o.type === 'exhibitor';
      const clickAction = isExhibitor
        ? `onclick="openMessageModal(this)" data-name="${escapeHtml(o.org_name)}" data-email="${escapeHtml(o.contact_email || o.email || '')}"`
        : `onclick="openAvailabilityModal(${o.id})"`;
      const btnLabel = isExhibitor ? 'Send Message' : 'View Availability';
      const initials = (o.org_name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const initialsColor = o.type === 'hotel' ? '#4EA8DE' : o.type === 'exhibitor' ? '#F59E0B' : '#A78BFA';
      return `
      <div class="org-card ${typeClass}" ${clickAction}>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          ${o.photo_url
            ? `<img src="${escapeHtml(o.photo_url)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0">`
            : `<div style="width:36px;height:36px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${initialsColor};flex-shrink:0">${initials}</div>`
          }
          ${o.logo_url
            ? `<img src="${escapeHtml(o.logo_url)}" style="width:36px;height:36px;border-radius:var(--radius-xs);object-fit:contain;background:var(--bg-elevated);flex-shrink:0">`
            : ''
          }
          <div class="type-icon ${typeColor}" style="margin-bottom:0;margin-left:auto">${typeIcon}${typeLabel}</div>
        </div>
        <h3>${escapeHtml(o.org_name)}</h3>
        ${o.contact_name ? `<div style="font-size:12px;color:var(--ink-muted);margin-bottom:4px">${escapeHtml(o.contact_name)}</div>` : ''}
        <div class="org-meta">${escapeHtml([o.city, o.country].filter(Boolean).join(', '))}</div>
        <div class="org-desc">${escapeHtml(o.description || '')}</div>
        <div style="margin-top:14px"><span class="btn btn-small btn-ghost btn-inline">${btnLabel}</span></div>
      </div>`;
    }).join('');
  };
  document.getElementById('book-search').addEventListener('input', renderList);
  renderList();
}

window.openAvailabilityModal = async function(otherId) {
  try {
    const { other, slots } = await api.get(`/api/users/${otherId}/availability`);
    const modal = document.createElement('div');
    const grouped = {};
    for (const s of slots) {
      if (!grouped[s.day]) grouped[s.day] = [];
      grouped[s.day].push(s);
    }

    modal.innerHTML = `
      <div class="eyebrow">${other.type === 'hotel' ? 'Hotel' : 'Agency'}</div>
      <h3 style="margin-top:8px">${escapeHtml(other.org_name)}</h3>
      <p class="text-muted" style="font-size:13px;margin-bottom:20px">${escapeHtml(other.contact_name || '')} · ${escapeHtml(other.country || '')}</p>
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px">Pick an available slot to request a 20-minute meeting. All times are Dubai time (GMT+4).</p>
      ${Object.keys(grouped).sort().map(day => {
        const daySlots = grouped[day];
        const anyAvailable = daySlots.some(s => s.available && !isLocked(s.start_time));
        return `
          <div style="margin-bottom:20px">
            <div class="eyebrow" style="margin-bottom:8px">${fmtDate(day)}</div>
            ${!anyAvailable ? '<p class="text-muted" style="font-size:13px">No available slots on this day.</p>' : ''}
            <div class="slot-grid">
              ${daySlots.map(s => {
                const locked = isLocked(s.start_time);
                const cls = s.available && !locked ? 'free' :
                            s.my_status === 'no_slot' ? 'blocked' :
                            s.my_status !== 'free' ? 'held' : 'blocked';
                const clickable = s.available && !locked;
                let statusLabel = 'Blocked';
                if (locked) statusLabel = 'Locked';
                else if (s.available) statusLabel = 'Available';
                else if (s.my_status === 'no_slot') statusLabel = 'Not your day';
                else if (s.my_status === 'booked' || s.my_status === 'held') statusLabel = 'You busy';
                else if (s.their_status !== 'free') statusLabel = 'They busy';
                return `<div class="slot ${cls}${locked ? ' locked' : ''}" ${clickable ? `onclick="requestMeetingModal(${otherId}, '${s.start_time}', '${escapeHtml(other.org_name)}')"` : ''} style="${clickable ? 'cursor:pointer' : 'cursor:not-allowed'}">
                  <div class="slot-time">${fmtTime(s.start_time)}</div>
                  <div class="slot-status">${statusLabel}</div>
                </div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}
    `;
    openModal(modal);
  } catch (err) {
    toast(err.message, 'error');
  }
};

window.requestMeetingModal = function(otherId, startTime, orgName) {
  document.querySelectorAll('.modal-backdrop').forEach(m => m.remove());
  const modal = document.createElement('div');
  modal.innerHTML = `
    <h3>Request Meeting</h3>
    <p class="text-muted" style="margin-top:8px;margin-bottom:20px">With <strong>${orgName}</strong> on ${fmtDate(startTime)} at ${fmtTime(startTime)}</p>
    <div class="field">
      <label>Optional Message</label>
      <textarea id="req-message" placeholder="Introduce yourself or mention what you'd like to discuss..." rows="4"></textarea>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px">
      <button class="btn btn-small btn-ghost" onclick="document.querySelectorAll('.modal-backdrop').forEach(m => m.remove())">Cancel</button>
      <button class="btn btn-small" id="req-send">Send Request</button>
    </div>
  `;
  openModal(modal);
  document.getElementById('req-send').addEventListener('click', async () => {
    const btn = document.getElementById('req-send');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      await api.post('/api/meetings', {
        recipient_id: otherId,
        start_time: startTime,
        message: document.getElementById('req-message').value
      });
      document.querySelectorAll('.modal-backdrop').forEach(m => m.remove());
      toast('Request sent', 'success');
      await loadAll();
      renderMeetings();
      renderAgenda();
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Send Request';
    }
  });
};

window.toggleSlot = async function(slotId) {
  try {
    const res = await api.post(`/api/me/slots/${slotId}/toggle`);
    toast(res.status === 'blocked' ? 'Slot closed' : 'Slot opened', 'success');
    await loadAll();
    renderAgenda();
  } catch (err) { toast(err.message, 'error'); }
};

window.openMessageModal = function(el) {
  const name = el.dataset.name;
  const email = el.dataset.email;
  const modal = document.createElement('div');
  modal.innerHTML = `
    <h3>Send a message to ${escapeHtml(name)}</h3>
    <p class="text-muted" style="margin-top:8px;margin-bottom:20px">Introduce yourself or ask a question. Your message will be sent via email.</p>
    <div class="field">
      <label>Your message</label>
      <textarea id="exhibitor-msg" rows="5" placeholder="Hi, I'd like to learn more about your offerings at Engage by Elevate..."></textarea>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-ghost btn-small btn-inline" onclick="document.querySelectorAll('.modal-backdrop').forEach(m => m.remove())">Cancel</button>
      <button class="btn btn-small btn-inline" id="send-exhibitor-msg">Send Message</button>
    </div>
  `;
  openModal(modal);
  document.getElementById('send-exhibitor-msg').addEventListener('click', async () => {
    const msg = document.getElementById('exhibitor-msg').value.trim();
    if (!msg) { toast('Please write a message', 'error'); return; }
    const btn = document.getElementById('send-exhibitor-msg');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      await api.post('/api/message-exhibitor', { exhibitor_name: name, exhibitor_email: email, message: msg });
      document.querySelectorAll('.modal-backdrop').forEach(m => m.remove());
      toast('Message sent', 'success');
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Send Message';
    }
  });
};

window.showMeetingDetail = function(meetingId) {
  const m = meetings.find(x => x.id === meetingId);
  if (!m) return;
  document.querySelector('[data-tab="meetings"]').click();
};

async function renderProfile() {
  const el = document.getElementById('tab-profile');
  const { user: full } = await api.get('/auth/me');
  const res = await api.get(`/api/public/profile/${me.id}`);
  const p = res.profile;

  el.innerHTML = `
    <h3 style="margin-bottom:8px">Your Public Profile</h3>
    <p class="text-muted" style="margin-bottom:24px">This is what everyone else sees in the directory.</p>

    <!-- Photo upload -->
    <div class="field">
      <label>Your Photo</label>
      <p style="font-size:12px;color:var(--ink-muted);margin-bottom:8px">Square headshot, min 200x200px. Max 2MB. JPG, PNG or WebP.</p>
      <div class="logo-upload">
        ${p.photo_url
          ? `<img id="profile-photo-preview" class="logo-upload-preview" src="${escapeHtml(p.photo_url)}" style="border-radius:50%">`
          : `<img id="profile-photo-preview" class="logo-upload-preview" src="" style="display:none;border-radius:50%">
             <div id="profile-photo-placeholder" class="logo-upload-preview" style="display:flex;align-items:center;justify-content:center;color:var(--ink-muted);font-size:11px;border-radius:50%">No photo</div>`
        }
        <label class="logo-upload-btn" for="profile-photo-file">Upload Photo</label>
        <input type="file" id="profile-photo-file" accept=".png,.jpg,.jpeg,.webp" style="display:none">
      </div>
    </div>

    <!-- Logo upload -->
    <div class="field">
      <label>Company Logo</label>
      <p style="font-size:12px;color:var(--ink-muted);margin-bottom:8px">Transparent PNG or SVG preferred. Max 2MB. Displayed at 44x44px in directory.</p>
      <div class="logo-upload">
        ${p.logo_url
          ? `<img id="profile-logo-preview" class="logo-upload-preview" src="${escapeHtml(p.logo_url)}">`
          : `<img id="profile-logo-preview" class="logo-upload-preview" src="" style="display:none">
             <div id="profile-logo-placeholder" class="logo-upload-preview" style="display:flex;align-items:center;justify-content:center;color:var(--ink-muted);font-size:11px">No logo</div>`
        }
        <label class="logo-upload-btn" for="profile-logo-file">Upload Logo</label>
        <input type="file" id="profile-logo-file" accept=".png,.jpg,.jpeg,.svg,.webp" style="display:none">
      </div>
    </div>

    <form id="profile-form">
      <div class="form-grid">
        <div class="field"><label>Organization</label><input name="org_name" value="${escapeHtml(p.org_name)}" required></div>
        <div class="field"><label>Website</label><input name="website" value="${escapeHtml(p.website || '')}"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Country</label>${renderCountrySelect('country', p.country || '', false)}</div>
        <div class="field"><label>City</label><input name="city" value="${escapeHtml(p.city || '')}"></div>
      </div>
      <div class="field"><label>Description</label><textarea name="description" rows="4">${escapeHtml(p.description || '')}</textarea></div>
      <div class="form-grid">
        <div class="field"><label>Specialties</label><div id="prof-specialties">${renderTagPicker('specialties', SPECIALTIES, p.specialties || [])}</div></div>
        <div class="field"><label>Target Markets</label><div id="prof-markets">${renderTagPicker('target_markets', TARGET_MARKETS, p.target_markets || [])}</div></div>
      </div>
      ${me.type === 'hotel' ? `
        <div class="form-grid">
          <div class="field"><label>Room Count</label><input name="room_count" type="number" value="${p.room_count || ''}"></div>
          <div class="field"><label>Star Rating</label>
            <select name="star_rating">
              <option value="">—</option>
              ${[3,4,5].map(n => `<option value="${n}" ${p.star_rating == n ? 'selected' : ''}>${n} stars</option>`).join('')}
            </select>
          </div>
        </div>
      ` : ''}
      <button type="submit" class="btn" style="width:100%;margin-top:8px">Save Profile</button>
    </form>
  `;

  // Photo upload handler
  document.getElementById('profile-photo-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('photo', file);
    try {
      const res = await fetch('/api/upload-photo', { method: 'POST', credentials: 'include', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      const preview = document.getElementById('profile-photo-preview');
      preview.src = data.photo_url;
      preview.style.display = 'block';
      const placeholder = document.getElementById('profile-photo-placeholder');
      if (placeholder) placeholder.style.display = 'none';
      toast('Photo uploaded', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  // Logo upload handler
  document.getElementById('profile-logo-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('logo', file);
    try {
      const res = await fetch('/api/upload-logo', { method: 'POST', credentials: 'include', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      const preview = document.getElementById('profile-logo-preview');
      preview.src = data.logo_url;
      preview.style.display = 'block';
      const placeholder = document.getElementById('profile-logo-placeholder');
      if (placeholder) placeholder.style.display = 'none';
      toast('Logo uploaded', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'Saving...';
    const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    if (body.specialties) body.specialties = body.specialties.split(',').map(s => s.trim()).filter(Boolean);
    if (body.target_markets) body.target_markets = body.target_markets.split(',').map(s => s.trim()).filter(Boolean);
    if (body.room_count) body.room_count = parseInt(body.room_count, 10);
    if (body.star_rating) body.star_rating = parseInt(body.star_rating, 10);
    try {
      await api.put('/api/me/profile', body);
      toast('Profile saved', 'success');
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Save Profile';
    }
  });
}
</script>

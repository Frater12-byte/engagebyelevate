<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Profile — Engage by Elevate 2026</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><img src="/img/logo.png" alt="Elevate"><span class="brand-name"><span class="highlight">Engage</span> by Elevate</span></a>
    <div class="nav-links" id="nav-links">
      <a href="/agenda">Agenda</a>
      <a href="/directory">Directory</a>
      <a id="nav-auth-link" href="/login.html">Sign in</a>
      <a href="/signup.html" class="nav-cta">Register Now</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>
</nav>

<section>
  <div class="container" style="max-width:800px">
    <a href="/directory" style="font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);display:inline-flex;align-items:center;gap:6px;margin-bottom:32px">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to directory
    </a>
    <div id="content">
      <div class="loader" style="margin:80px auto;display:block"></div>
    </div>
  </div>
</section>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Home</span></a>
    <a href="/agenda"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Events</span></a>
    <a href="/directory" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>Directory</span></a>
    <a href="/dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>Profile</span></a>
  </div>
</nav>

<script src="/js/common.js"></script>
<script>
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('nav-toggle').classList.toggle('open');
});

(async () => {
  const me = await getMe();
  if (me) {
    document.getElementById('nav-auth-link').textContent = 'Dashboard';
    document.getElementById('nav-auth-link').href = '/dashboard';
  }

  const id = new URLSearchParams(location.search).get('id');
  if (!id) return location.href = '/directory';

  const content = document.getElementById('content');

  try {
    const { profile: p } = await api.get(`/api/public/profile/${id}`);
    const canBook = me && me.type !== p.type && ['hotel','agent'].includes(me.type) && ['hotel','agent'].includes(p.type);
    const initials = (p.org_name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

    content.innerHTML = `
      <!-- Profile header -->
      <div style="text-align:center;margin-bottom:40px">
        ${p.logo_url
          ? `<img src="${escapeHtml(p.logo_url)}" alt="${escapeHtml(p.org_name)}" style="width:100px;height:100px;border-radius:var(--radius-sm);object-fit:contain;background:var(--bg-elevated);margin-bottom:20px">`
          : `<div style="width:100px;height:100px;border-radius:var(--radius-sm);background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:32px;color:var(--orange);margin:0 auto 20px">${initials}</div>`
        }
        <div class="eyebrow" style="margin-bottom:8px">${p.type === 'hotel' ? 'Hotel' : 'Agency'}${p.star_rating ? ' · ' + p.star_rating + ' Stars' : ''}${p.region ? ' · ' + p.region : ''}</div>
        <h1 style="font-size:clamp(1.8rem,6vw,3rem)">${escapeHtml(p.org_name)}</h1>
        <p class="text-muted" style="margin-top:8px;font-size:1.05rem">${escapeHtml([p.city, p.country].filter(Boolean).join(', '))}</p>
        ${p.website ? `<p style="margin-top:12px"><a href="${escapeHtml(p.website)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:14px">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          ${escapeHtml(p.website.replace(/^https?:\/\//, ''))}
        </a></p>` : ''}
      </div>

      ${p.description ? `
        <hr class="gradient-line" style="margin:0 0 32px">
        <p style="font-size:1rem;line-height:1.8;color:var(--ink-soft);max-width:56ch;margin:0 auto 32px;text-align:center">${escapeHtml(p.description)}</p>
      ` : ''}

      <!-- Stats -->
      <div class="profile-stats">
        ${p.room_count ? `<div class="profile-stat"><div class="stat-value">${p.room_count}</div><div class="stat-label">Rooms</div></div>` : ''}
        ${p.star_rating ? `<div class="profile-stat"><div class="stat-value">${'*'.repeat(p.star_rating)}</div><div class="stat-label">Rating</div></div>` : ''}
        ${p.specialties && p.specialties.length ? `<div class="profile-stat"><div class="stat-value">${p.specialties.length}</div><div class="stat-label">Specialties</div></div>` : ''}
        ${p.target_markets && p.target_markets.length ? `<div class="profile-stat"><div class="stat-value">${p.target_markets.length}</div><div class="stat-label">Markets</div></div>` : ''}
      </div>

      <!-- Details -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
        ${p.specialties && p.specialties.length ? `
          <div>
            <div class="eyebrow" style="margin-bottom:10px">Specialties</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${p.specialties.map(s => `<span class="badge badge-gold">${escapeHtml(s)}</span>`).join('')}
            </div>
          </div>` : ''}
        ${p.target_markets && p.target_markets.length ? `
          <div>
            <div class="eyebrow" style="margin-bottom:10px">Target Markets</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${p.target_markets.map(s => `<span class="badge">${escapeHtml(s)}</span>`).join('')}
            </div>
          </div>` : ''}
      </div>

      <!-- CTA -->
      ${canBook ? `
        <div style="margin-top:48px;text-align:center">
          <h3>Interested in a meeting?</h3>
          <p class="text-muted" style="margin-top:8px">View availability and request a 20-minute slot.</p>
          <a href="/dashboard" class="btn btn-inline" style="margin-top:20px">Book a Meeting</a>
        </div>
      ` : !me ? `
        <div style="margin-top:48px;padding:32px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);text-align:center">
          <h3>Want to meet ${escapeHtml(p.org_name)}?</h3>
          <p class="text-muted" style="margin-top:8px">Register or sign in to request a meeting.</p>
          <div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="/signup.html" class="btn">Register</a>
            <a href="/login.html" class="btn btn-ghost">Sign in</a>
          </div>
        </div>
      ` : ''}
    `;

    document.title = `${p.org_name} — Engage by Elevate`;
  } catch (err) {
    content.innerHTML = `<div class="empty-state"><h3>Profile not found</h3><p>This organization may have been removed.</p></div>`;
  }
})();
</script>
</body>
</html>

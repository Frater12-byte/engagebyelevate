<section class="hero" style="padding:24px 0 16px">
  <div class="container">
    <div class="eyebrow" style="margin-bottom:12px">Participants</div>

      <button class="dash-tab" data-view="agents">Agencies <span class="tab-count" id="count-agents"></span></button>

    </div>

      <input id="search" placeholder="Search by name, country...">

    </div>

    <a href="/dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>Profile</span></a>
  </div>

<script src="/js/common.js"></script>
<script>
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
    document.getElementById('nav-toggle').classList.toggle('open');
  });

  let me = null, currentView = 'hotels';
  let data = { hotels: [], agents: [], boards: [] };

  async function init() {
    me = await getMe();
    if (me) {
      document.getElementById('nav-auth-link').textContent = 'Dashboard';
      document.getElementById('nav-auth-link').href = '/dashboard';
    }
    await Promise.all([loadHotels(), loadAgents(), loadBoards()]);
    document.getElementById('count-hotels').textContent = `(${data.hotels.length})`;
    document.getElementById('count-agents').textContent = `(${data.agents.length})`;
    document.getElementById('count-boards').textContent = `(${data.boards.length})`;
    render();
  }

  async function loadHotels() { try { data.hotels = (await api.get('/api/public/hotels')).hotels; } catch {} }
  async function loadAgents() { try { data.agents = (await api.get('/api/public/agents')).agents; } catch {} }
  async function loadBoards() { try { data.boards = (await api.get('/api/public/tourism-boards')).boards; } catch {} }

  document.querySelectorAll('.dash-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.dash-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentView = t.dataset.view;
      render();
    });
  });
  document.getElementById('search').addEventListener('input', render);

  function matches(item, query) {
    if (!query) return true;
    const q = query.toLowerCase();
    return (item.org_name || item.name || '').toLowerCase().includes(q) ||
           (item.country || '').toLowerCase().includes(q) ||
           (item.city || '').toLowerCase().includes(q);
  }

  function render() {
    const container = document.getElementById('directory-content');
    const q = document.getElementById('search').value;

    let items, empty;
    if (currentView === 'hotels') { items = data.hotels.filter(h => matches(h, q)); empty = 'No hotels yet.'; }
    else if (currentView === 'agents') { items = data.agents.filter(a => matches(a, q)); empty = 'No agencies yet.'; }
    else { items = data.boards.filter(b => matches(b, q)); empty = 'Tourism boards coming soon.'; }

    document.getElementById('count-' + currentView).textContent = '(' + items.length + ')';

    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><h3>Nothing here yet</h3><p>${empty}</p></div>`;
      return;
    }

    if (currentView === 'boards') {
      container.innerHTML = `<div class="directory-grid">${items.map(b => `
        <div class="org-card">
          <div class="eyebrow">Tourism Board</div>
          <h3>${escapeHtml(b.name)}</h3>
          <div class="org-meta">${escapeHtml(b.country || '')}</div>
          <div class="org-desc">${escapeHtml(b.description || '')}</div>
        </div>
      `).join('')}</div>`;
      return;
    }

    container.innerHTML = `<div class="directory-grid">${items.map(o => {
      const initials = (o.org_name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      return `
        <a class="org-card" href="/profile.html?id=${o.id}">
          ${o.logo_url
            ? `<img class="org-logo" src="${escapeHtml(o.logo_url)}" alt="">`
            : `<div class="org-logo" style="display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--orange);font-size:16px">${initials}</div>`
          }
          <div class="eyebrow">${o.type === 'hotel' ? (o.star_rating ? o.star_rating + '★ · ' : '') + (o.region || '') : 'Agency'}</div>
          <h3>${escapeHtml(o.org_name)}</h3>
          <div class="org-meta">${escapeHtml([o.city, o.country].filter(Boolean).join(', '))}</div>
          <div class="org-desc">${escapeHtml(o.description || '')}</div>
          ${(o.specialties && o.specialties.length) ? `<div class="tags">${o.specialties.slice(0,3).map(s => `<span class="badge">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
        </a>`;
    }).join('')}</div>`;
  }

  init();
</script>

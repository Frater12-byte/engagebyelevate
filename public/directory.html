<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><img src="/img/logo.png" alt="Engage by Elevate"></a>
    <div class="nav-links" id="nav-links">
      <a href="/agenda">Agenda</a>
      <a href="/directory">Directory</a>
      <a href="/dashboard" class="auth-only" id="nav-dash">My Dashboard</a>

</nav>

<section class="hero" style="padding:24px 0 16px">
  <div class="container">
    <div class="eyebrow" style="margin-bottom:12px">Participants</div>
    <h1 style="font-size:clamp(2rem,7vw,3.5rem)">Directory.</h1>
    <p style="margin-top:8px;color:var(--ink-soft);max-width:50ch">Everyone attending Engage by Elevate 2026.</p>
    <p style="margin-top:8px;color:var(--ink-muted);font-size:14px;max-width:56ch">Click through to any profile to see their focus areas, then request a meeting from your dashboard.</p>
  </div>
</section>

<section style="padding-top:0">
  <div class="container">
    <div class="dash-tabs" style="margin-bottom:12px">
      <button class="dash-tab active" data-view="all">All <span class="tab-count" id="count-all"></span></button>
      <button class="dash-tab" data-view="hotels">Hotels <span class="tab-count" id="count-hotels"></span></button>
      <button class="dash-tab" data-view="agents">Agencies <span class="tab-count" id="count-agents"></span></button>
      <button class="dash-tab" data-view="boards">Exhibitors <span class="tab-count" id="count-boards"></span></button>
    </div>

    <div style="margin-bottom:16px">
      <input id="search" placeholder="Search by name, contact, country, city...">
    </div>

    <div id="directory-content">
      <div class="loader" style="margin:80px auto;display:block"></div>
    </div>
  </div>
</section>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Home</span></a>
    <a href="/agenda"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Agenda</span></a>
    <a href="/directory" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>Directory</span></a>
    <a href="/dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>Profile</span></a>
  </div>
</nav>

<script src="/js/common.js"></script>
<script>
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
    document.getElementById('nav-toggle').classList.toggle('open');
  });

  let me = null, currentView = 'all';
  let data = { hotels: [], agents: [], boards: [], exhibitorProfiles: [] };

  async function init() {
    me = await getMe();
    await updateNavForUser(me);
    await Promise.all([loadHotels(), loadAgents(), loadBoards(), loadExhibitorProfiles()]);
    document.getElementById('count-all').textContent = `(${data.hotels.length + data.agents.length + data.boards.length + data.exhibitorProfiles.length})`;
    document.getElementById('count-hotels').textContent = `(${data.hotels.length})`;
    document.getElementById('count-agents').textContent = `(${data.agents.length})`;
    document.getElementById('count-boards').textContent = `(${(data.boards.length + data.exhibitorProfiles.length)})`;
    render();
  }

  async function loadHotels() { try { data.hotels = (await api.get('/api/public/hotels')).hotels; } catch {} }
  async function loadAgents() { try { data.agents = (await api.get('/api/public/agents')).agents; } catch {} }
  async function loadBoards() { try { data.boards = (await api.get('/api/public/tourism-boards')).boards; } catch {} }
  async function loadExhibitorProfiles() { try { data.exhibitorProfiles = (await api.get('/api/exhibitors')).exhibitors; } catch { data.exhibitorProfiles = []; } }

  document.querySelectorAll('.dash-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.dash-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentView = t.dataset.view;
      render();
    });
  });
  document.getElementById('search').addEventListener('input', render);

  function matches(item, query) {
    if (!query) return true;
    const q = query.toLowerCase();
    return (item.org_name || item.name || '').toLowerCase().includes(q) ||
           (item.contact_name || '').toLowerCase().includes(q) ||
           (item.country || '').toLowerCase().includes(q) ||
           (item.city || '').toLowerCase().includes(q) ||
           (item.category || '').toLowerCase().includes(q);
  }

  function renderUserCard(o) {
    const initials = (o.org_name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const isHotel = o.type === 'hotel';
    const typeClass = isHotel ? 'type-hotel' : 'type-agent';
    const cardClass = isHotel ? 'card-hotel' : 'card-agent';
    const typeIcon = isHotel
      ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>'
      : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>';
    const typeLabel = isHotel ? `Hotel${o.star_rating ? ' · ' + o.star_rating + ' Stars' : ''}${o.region ? ' · ' + o.region : ''}` : 'Agency';
    return `<a class="org-card ${cardClass}" href="/profile.html?id=${o.id}">
      ${o.logo_url ? `<img class="org-logo" src="${escapeHtml(o.logo_url)}" alt="">` : `<div class="org-logo" style="display:flex;align-items:center;justify-content:center;font-weight:800;color:${isHotel ? '#4EA8DE' : '#A78BFA'};font-size:16px">${initials}</div>`}
      <div class="type-icon ${typeClass}">${typeIcon}${typeLabel}</div>
      <h3>${escapeHtml(o.org_name)}</h3>
      <div class="org-meta">${escapeHtml([o.city, o.country].filter(Boolean).join(', '))}</div>
      <div class="org-desc">${escapeHtml(o.description || '')}</div>
      ${(o.specialties && o.specialties.length) ? `<div class="tags">${o.specialties.slice(0,3).map(s => `<span class="badge">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
    </a>`;
  }
  function renderBoardCard(b) {
    return `<div class="org-card card-exhibitor"><div class="type-icon type-exhibitor"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Exhibitor</div><h3>${escapeHtml(b.name)}</h3><div class="org-meta">${escapeHtml(b.country || '')}</div><div class="org-desc">${escapeHtml(b.description || '')}</div></div>`;
  }
  function renderExhibitorCard(ex) {
    return `<a class="org-card card-exhibitor" href="/exhibitor/${encodeURIComponent(ex.slug)}">
      <div class="exhibitor-eyebrow"><span class="exhibitor-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></span><span class="exhibitor-tag">Exhibitor</span>${ex.logo_url ? `<img src="${escapeHtml(ex.logo_url)}" alt="" style="width:28px;height:28px;border-radius:4px;object-fit:contain;margin-left:auto">` : ''}</div>
      <div class="exhibitor-meta">${ex.category ? `<span class="exhibitor-category">${escapeHtml(ex.category)}</span>` : ''}${ex.booth_number ? `<span class="exhibitor-booth">Booth ${escapeHtml(ex.booth_number)}</span>` : ''}</div>
      <h3 class="exhibitor-name">${escapeHtml(ex.name)}</h3>
      <p class="exhibitor-desc">${escapeHtml(ex.description || '')}</p>
    </a>`;
  }

  function render() {
    const container = document.getElementById('directory-content');
    const q = document.getElementById('search').value;

    let items, extraItems, empty;
    if (currentView === 'all') {
      // Merge all types, sorted alphabetically
      const allMerged = [
        ...data.hotels.filter(h => matches(h, q)).map(h => ({...h, _render: 'hotel'})),
        ...data.agents.filter(a => matches(a, q)).map(a => ({...a, _render: 'agent'})),
        ...data.boards.filter(b => matches(b, q)).map(b => ({...b, _render: 'board'})),
        ...data.exhibitorProfiles.filter(b => matches(b, q)).map(b => ({...b, _render: 'exhibitor'}))
      ].sort((a, b) => (a.org_name || a.name || '').toLowerCase().localeCompare((b.org_name || b.name || '').toLowerCase()));
      document.getElementById('count-all').textContent = '(' + allMerged.length + ')';
      if (!allMerged.length) { container.innerHTML = '<div class="empty-state"><h3>No results</h3></div>'; return; }
      container.innerHTML = '<div class="directory-grid">' + allMerged.map(o => {
        if (o._render === 'hotel' || o._render === 'agent') return renderUserCard(o);
        if (o._render === 'exhibitor') return renderExhibitorCard(o);
        return renderBoardCard(o);
      }).join('') + '</div>';
      return;
    }
    if (currentView === 'hotels') { items = data.hotels.filter(h => matches(h, q)); empty = 'No hotels yet.'; }
    else if (currentView === 'agents') { items = data.agents.filter(a => matches(a, q)); empty = 'No agencies yet.'; }
    else {
      items = data.boards.filter(b => matches(b, q));
      extraItems = data.exhibitorProfiles.filter(b => matches(b, q));
      empty = 'Exhibitors coming soon.';
    }

    const totalCount = currentView === 'boards' ? (items.length + (extraItems ? extraItems.length : 0)) : items.length;
    document.getElementById('count-' + currentView).textContent = '(' + totalCount + ')';

    if (currentView === 'boards' && !items.length && (!extraItems || !extraItems.length)) {
      container.innerHTML = `<div class="empty-state"><h3>Nothing here yet</h3><p>${empty}</p></div>`;
      return;
    }
    if (currentView !== 'boards' && !items.length) {
      container.innerHTML = `<div class="empty-state"><h3>Nothing here yet</h3><p>${empty}</p></div>`;
      return;
    }

    if (currentView === 'boards') {
      const boardCards = items.map(b => `
        <div class="org-card card-exhibitor">
          <div class="type-icon type-exhibitor"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Exhibitor</div>
          <h3>${escapeHtml(b.name)}</h3>
          <div class="org-meta">${escapeHtml(b.country || '')}</div>
          <div class="org-desc">${escapeHtml(b.description || '')}</div>
        </div>
      `).join('');
      const exhibitorCards = (extraItems || []).map(ex => {
        const initials = (ex.name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        return `
        <a class="org-card card-exhibitor" href="/exhibitor/${encodeURIComponent(ex.slug)}">
          <div class="exhibitor-eyebrow">
            <span class="exhibitor-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></span>
            <span class="exhibitor-tag">Exhibitor</span>
            ${ex.logo_url ? `<img src="${escapeHtml(ex.logo_url)}" alt="" style="width:28px;height:28px;border-radius:4px;object-fit:contain;margin-left:auto">` : ''}
          </div>
          <div class="exhibitor-meta">
            ${ex.category ? `<span class="exhibitor-category">${escapeHtml(ex.category)}</span>` : ''}
            ${ex.booth_number ? `<span class="exhibitor-booth">Booth ${escapeHtml(ex.booth_number)}</span>` : ''}
          </div>
          <h3 class="exhibitor-name">${escapeHtml(ex.name)}</h3>
          <p class="exhibitor-desc">${escapeHtml(ex.description || '')}</p>
        </a>`;
      }).join('');
      container.innerHTML = `<div class="directory-grid">${boardCards}${exhibitorCards}</div>`;
      return;
    }

    container.innerHTML = `<div class="directory-grid">${items.map(o => {
      const initials = (o.org_name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const isHotel = o.type === 'hotel';
      const typeClass = isHotel ? 'type-hotel' : 'type-agent';
      const cardClass = isHotel ? 'card-hotel' : 'card-agent';
      const typeIcon = isHotel
        ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>'
        : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>';
      const typeLabel = isHotel ? `Hotel${o.star_rating ? ' · ' + o.star_rating + ' Stars' : ''}${o.region ? ' · ' + o.region : ''}` : 'Agency';
      return `
        <a class="org-card ${cardClass}" href="/profile.html?id=${o.id}">
          ${o.logo_url
            ? `<img class="org-logo" src="${escapeHtml(o.logo_url)}" alt="">`
            : `<div class="org-logo" style="display:flex;align-items:center;justify-content:center;font-weight:800;color:${isHotel ? '#4EA8DE' : '#A78BFA'};font-size:16px">${initials}</div>`
          }
          <div class="type-icon ${typeClass}">${typeIcon}${typeLabel}</div>
          <h3>${escapeHtml(o.org_name)}</h3>
          <div class="org-meta">${escapeHtml([o.city, o.country].filter(Boolean).join(', '))}</div>
          <div class="org-desc">${escapeHtml(o.description || '')}</div>
          ${(o.specialties && o.specialties.length) ? `<div class="tags">${o.specialties.slice(0,3).map(s => `<span class="badge">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
        </a>`;
    }).join('')}</div>`;
  }

  init();
</script>
</body>
</html>

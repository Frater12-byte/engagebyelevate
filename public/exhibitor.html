<script>
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('nav-toggle').classList.toggle('open');
});

(async () => {
  const me = await getMe();
  await updateNavForUser(me);

  // Extract slug from URL: /exhibitor/some-slug
  const slug = location.pathname.split('/').filter(Boolean).pop();
  if (!slug) return location.href = '/directory';

  const content = document.getElementById('content');

  try {
    const { exhibitor: ex } = await api.get(`/api/exhibitors/${encodeURIComponent(slug)}`);
    const initials = (ex.name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

    content.innerHTML = `
      <!-- Exhibitor header -->
      <div style="text-align:center;margin-bottom:40px">
        ${ex.logo_url
          ? `<img src="${escapeHtml(ex.logo_url)}" alt="${escapeHtml(ex.name)}" style="width:100px;height:100px;border-radius:var(--radius-sm);object-fit:contain;background:var(--bg-elevated);margin-bottom:20px">`
          : `<div style="width:100px;height:100px;border-radius:var(--radius-sm);background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:32px;color:var(--orange);margin:0 auto 20px">${initials}</div>`
        }
        <div class="eyebrow" style="margin-bottom:8px">
          Exhibitor${ex.category ? ' · ' + escapeHtml(ex.category) : ''}
        </div>
        <h1 style="font-size:clamp(1.8rem,6vw,3rem)">${escapeHtml(ex.name)}</h1>
        ${ex.booth_number ? `<div style="margin-top:12px"><span class="badge badge-gold">Booth ${escapeHtml(ex.booth_number)}</span></div>` : ''}
        ${ex.description ? `
          <hr class="gradient-line" style="margin:24px 0">
          <p style="font-size:1rem;line-height:1.8;color:var(--ink-soft);max-width:56ch;margin:0 auto 24px;text-align:center">${escapeHtml(ex.description)}</p>
        ` : ''}
        ${ex.website ? `<p style="margin-top:12px"><a href="${escapeHtml(ex.website)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:14px">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          ${escapeHtml(ex.website.replace(/^https?:\/\//, ''))}
        </a></p>` : ''}
      </div>

      <!-- Contact form -->
      <div style="margin-top:48px;padding:32px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius)">
        <h3 style="margin-bottom:8px">Get in touch</h3>
        <p class="text-muted" style="margin-bottom:24px">Send a message to ${escapeHtml(ex.name)}. They will reply directly to your email.</p>
        <form id="contact-form">
          <div class="form-grid">
            <div class="field"><label>Your Name *</label><input name="sender_name" required ${me ? `value="${escapeHtml(me.contact_name)}"` : ''}></div>
            <div class="field"><label>Company</label><input name="sender_company" ${me ? `value="${escapeHtml(me.org_name)}"` : ''}></div>
          </div>
          <div class="field"><label>Email *</label><input name="sender_email" type="email" required ${me ? `value="${escapeHtml(me.email)}"` : ''}></div>
          <div class="field"><label>Message *</label><textarea name="message" rows="5" required placeholder="Hi, I'd like to learn more about your offerings at Engage by Elevate..."></textarea></div>
          <button type="submit" class="btn" style="width:100%;margin-top:8px">Send Message</button>
        </form>
        <div id="contact-success" style="display:none;text-align:center;padding:32px 0">
          <div style="font-size:40px;margin-bottom:16px">&#10003;</div>
          <h3>Message sent</h3>
          <p class="text-muted" style="margin-top:8px">${escapeHtml(ex.name)} will reply directly to your email.</p>
        </div>
      </div>
    `;

    document.title = `${ex.name} — Engage by Elevate`;

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = 'Sending...';
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      try {
        await api.post(`/api/exhibitors/${slug}/contact`, body);
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('contact-success').style.display = 'block';
      } catch (err) {
        toast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Send Message';
      }
    });

  } catch (err) {
    content.innerHTML = '<div class="empty-state"><h3>Exhibitor not found</h3><p>This exhibitor may have been removed.</p></div>';
  }
})();
</script>

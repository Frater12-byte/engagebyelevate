  <div class="nav-inner">
    <a href="/" class="brand"><img src="/img/logo.png" alt="Engage by Elevate"></a>
    <div class="nav-links" id="nav-links">

      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>

<div id="content">
  <div class="loader" style="margin:120px auto;display:block"></div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>Home</span></a>
    <a href="/agenda"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>Agenda</span></a>
    <a href="/directory"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>Directory</span></a>
    <a href="/dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>Profile</span></a>
  </div>

<script src="/js/common.js"></script>
<script>
document.getElementById('nav-toggle').addEventListener('click', () => {
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('nav-toggle').classList.toggle('open');
});

(async () => {
  const me = await getMe();
  await updateNavForUser(me);

  const slug = location.pathname.split('/').filter(Boolean).pop();
  if (!slug) return location.href = '/directory';

  const content = document.getElementById('content');

  try {
    const { exhibitor: ex } = await api.get(`/api/exhibitors/${encodeURIComponent(slug)}`);
    const initials = (ex.name || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

    document.title = `${ex.name} — Engage by Elevate 2026`;

    content.innerHTML = `
      <!-- Hero banner -->
      <section class="hero" style="padding:56px 0 40px;position:relative;overflow:hidden">
        <div class="glow-orange" style="top:-80px;right:-60px"></div>
        <div class="glow-purple" style="bottom:-60px;left:-40px"></div>
        <div class="container" style="max-width:800px;position:relative;z-index:2">
          <a href="/directory" style="font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);display:inline-flex;align-items:center;gap:6px;margin-bottom:24px">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Directory
          </a>

          <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
            ${ex.logo_url
              ? `<img src="${escapeHtml(ex.logo_url)}" alt="${escapeHtml(ex.name)}" style="width:80px;height:80px;border-radius:var(--radius-sm);object-fit:contain;background:var(--bg-elevated);flex-shrink:0">`
              : `<div style="width:80px;height:80px;border-radius:var(--radius-sm);background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:28px;color:var(--orange);flex-shrink:0">${initials}</div>`
            }
            <div>
              <div class="eyebrow" style="margin-bottom:6px">
                Exhibitor${ex.category ? ' · ' + escapeHtml(ex.category) : ''}
              </div>
              <h1 style="font-size:clamp(1.8rem,5vw,2.8rem)">${escapeHtml(ex.name)}</h1>
              ${ex.booth_number ? `<span class="badge badge-gold" style="margin-top:8px;display:inline-block">Booth ${escapeHtml(ex.booth_number)}</span>` : ''}
            </div>
          </div>
        </div>
      </section>

      <hr class="gradient-line">

      <!-- About -->
      <section style="padding:48px 0">
        <div class="container" style="max-width:800px">
          ${ex.description ? `
            <div class="eyebrow" style="margin-bottom:12px">About</div>
            <p style="font-size:1.05rem;line-height:1.8;color:var(--ink-soft);max-width:60ch">${escapeHtml(ex.description)}</p>
          ` : ''}

          <!-- Details grid -->
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:32px">
            ${ex.website ? `
              <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:20px">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px">Website</div>
                <a href="${escapeHtml(ex.website)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600">
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                  ${escapeHtml(ex.website.replace(/^https?:\/\//, ''))}
                </a>
              </div>
            ` : ''}
            ${ex.booth_number ? `
              <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:20px">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px">Booth</div>
                <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:var(--orange)">${escapeHtml(ex.booth_number)}</div>
              </div>
            ` : ''}
            ${ex.category ? `
              <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:20px">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px">Category</div>
                <div style="font-size:15px;font-weight:600;color:var(--white)">${escapeHtml(ex.category)}</div>
              </div>
            ` : ''}
            ${ex.contact_name ? `
              <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:20px">
                <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px">Contact</div>
                <div style="font-size:15px;font-weight:600;color:var(--white)">${escapeHtml(ex.contact_name)}</div>
              </div>
            ` : ''}
          </div>

          <!-- Contact section -->
          <div style="margin-top:48px" id="contact-section">
            ${me ? `
              <div class="eyebrow" style="margin-bottom:12px">Get in Touch</div>
              <h3 style="margin-bottom:8px">Send a message to ${escapeHtml(ex.name)}</h3>
              <p class="text-muted" style="margin-bottom:20px;font-size:14px">Your message will be sent from <strong style="color:var(--white)">${escapeHtml(me.contact_name)}</strong> (${escapeHtml(me.org_name)}) to their team. They will reply directly to ${escapeHtml(me.email)}.</p>
              <form id="contact-form" novalidate>
                <div class="field">
                  <label>Your Message</label>
                  <textarea name="message" rows="5" required placeholder="Hi, I'd like to learn more about your offerings at Engage by Elevate..."></textarea>
                </div>
                <button type="submit" class="btn" style="width:100%">Send Message</button>
              </form>
              <div id="contact-success" style="display:none;text-align:center;padding:40px 0">
                <div style="font-family:var(--font-display);font-size:2rem;font-weight:900;color:var(--success);margin-bottom:12px">Sent</div>
                <h3>Message delivered</h3>
                <p class="text-muted" style="margin-top:8px">${escapeHtml(ex.name)} will reply to ${escapeHtml(me.email)} directly.</p>
                <a href="/directory" class="btn btn-ghost btn-inline" style="margin-top:20px">Back to Directory</a>
              </div>
            ` : `
              <div style="text-align:center;padding:40px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius)">
                <h3 style="margin-bottom:8px">Want to connect with ${escapeHtml(ex.name)}?</h3>
                <p class="text-muted" style="margin-bottom:20px">Sign in to send them a message.</p>
                <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
                  <a href="/login.html" class="btn btn-inline">Sign In</a>
                  <a href="/signup.html" class="btn btn-ghost btn-inline">Register</a>
                </div>
              </div>
            `}
          </div>
        </div>
      </section>
    `;

    // Wire contact form
    const form = document.getElementById('contact-form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = form.querySelector('textarea').value.trim();
        if (!msg) { toast('Please write a message', 'error'); return; }
        const btn = form.querySelector('button');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
          await api.post(`/api/exhibitors/${slug}/contact`, { message: msg });
          form.style.display = 'none';
          document.getElementById('contact-success').style.display = 'block';
        } catch (err) {
          toast(err.message, 'error');
          btn.disabled = false; btn.textContent = 'Send Message';
        }
      });
    }

  } catch (err) {
    content.innerHTML = '<section><div class="container" style="max-width:800px"><div class="empty-state"><h3>Exhibitor not found</h3><p>This exhibitor may have been removed.</p><a href="/directory" class="btn btn-ghost btn-inline" style="margin-top:16px">Back to Directory</a></div></div></section>';
  }
})();
</script>
</body>
</html>
